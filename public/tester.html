<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure API Tester</title>
  </head>
  <body>
    <h1>Secure Notes API - Tester</h1>
    <small>Base URL: <span id="baseUrl"></span></small>

    <div class="card">
      <h2>Inscription</h2>
      <div class="row">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" value="lucie@test.com" />
        </div>
        <div>
          <label for="password">Mot de passe</label>
          <input id="password" type="password" value="MonMotDePasse123" />
        </div>
      </div>
      <button id="registerBtn">POST /api/auth/register</button>
    </div>

    <div class="card">
      <h2>Connexion</h2>
      <button id="loginBtn">POST /api/auth/login</button>
    </div>

    <div class="card">
      <h2>Token JWT</h2>
      <label for="token">Access Token</label>
      <input id="token" type="text" placeholder="Se remplit automatiquement après login" readonly />
      <button id="copyBtn" class="copy-btn">Copier le token</button>
      <button id="meBtn">GET /api/auth/me (protégée)</button>
    </div>

    <div class="card">
      <h2>Notes - CRUD sécurisé</h2>
      <div>
        <label for="noteTitle">Titre</label>
        <input id="noteTitle" type="text" value="Ma première note" />
      </div>
      <div>
        <label for="noteContent">Contenu</label>
        <textarea id="noteContent" rows="4">Contenu secret de la note</textarea>
      </div>
      <div>
        <label for="noteId">ID de note</label>
        <input id="noteId" type="text" placeholder="Se remplit après création" />
      </div>

      <button id="createNoteBtn">POST /api/notes/notes</button>
      <button id="getNotesBtn">GET /api/notes/notes</button>
      <button id="getNoteByIdBtn">GET /api/notes/notes/:id</button>
      <button id="updateNoteBtn">PUT /api/notes/notes/:id</button>
      <button id="deleteNoteBtn">DELETE /api/notes/notes/:id</button>
    </div>

    <div class="card">
      <h2>Réponse</h2>
      <pre id="output">Cliquez sur un bouton pour tester...</pre>
    </div>

    <script src="tester.js" defer></script>
  </body>
</html>
